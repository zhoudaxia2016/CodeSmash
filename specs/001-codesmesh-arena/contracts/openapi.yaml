openapi: 3.1.0
info:
  title: CodeSmesh Optional API
  version: 0.2.0
  description: >
    可选组件：公共排行榜的提交与查询。CodeSmesh 主流程（LLM 调用、QuickJS 评测）在浏览器完成，本 API 不接收、不存储供应商 API Key。
    题目与官方用例可由前端静态资源提供；若未来引入集中题库，可在此扩展只读 paths。

servers:
  - url: https://api.example.com
    description: Deno Deploy 或自托管（实现时替换）

tags:
  - name: leaderboard

paths:
  /v1/leaderboard/submissions:
    post:
      tags: [leaderboard]
      summary: 提交匿名聚合结果（速率限制由实现定义）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaderboardSubmission'
      responses:
        '202':
          description: Accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/leaderboard:
    get:
      tags: [leaderboard]
      summary: 查询公开排行榜
      parameters:
        - name: problem_id
          in: query
          schema: { type: string }
          description: 省略则返回全局聚合（若支持）
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaderboardEntry'

components:
  responses:
    BadRequest:
      description: Bad Request
    RateLimited:
      description: Too Many Requests
      headers:
        Retry-After:
          schema: { type: string }

  schemas:
    LeaderboardSubmission:
      type: object
      required:
        - problem_id
        - model_fingerprint
        - system_pass_rate
        - metric_rules_version
      properties:
        problem_id: { type: string }
        model_fingerprint:
          type: string
          description: 对 provider + model_id + host 等的单向哈希，不得包含 API Key 明文
        system_pass_rate: { type: number }
        self_pass_rate: { type: number, nullable: true }
        blind_spot_index: { type: number, nullable: true }
        duration_ms: { type: number, nullable: true }
        metric_rules_version: { type: string }
        submitted_at:
          type: string
          format: date-time
          nullable: true

    LeaderboardEntry:
      type: object
      required: [model_fingerprint, sample_count, avg_system_pass_rate, updated_at]
      properties:
        model_fingerprint: { type: string }
        problem_id: { type: string, nullable: true }
        sample_count: { type: integer }
        avg_system_pass_rate: { type: number }
        avg_blind_spot: { type: number, nullable: true }
        updated_at: { type: string, format: date-time }
